{% extends "base.html" %}

{% block content %}
<div class="legal-wrap">
  <h1>{{ content.title }}</h1>
  <p class="sub">{{ content.summary }}</p>
  <div class="legal-card">
    <ul>
      {% for item in content.items %}
      <li>{{ item }}</li>
      {% endfor %}
    </ul>
  </div>
  <p style="margin-top:24px">
    <a href="/zh-CN" style="color:var(--accent);font-size:13px">← 返回首页</a>
  </p>
</div>
{% endblock %}
