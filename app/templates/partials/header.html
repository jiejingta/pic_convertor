{% if tool is defined %}
{# ── Tool page header: back + breadcrumb ── #}
<header class="tool-header-bar">
  <a class="back-btn" href="/zh-CN">← 返回</a>
  <div class="breadcrumb">
    <span>首页</span>
    <span class="breadcrumb-sep">›</span>
    <span class="breadcrumb-cur">{{ tool.title }}</span>
  </div>
  <div class="header-right">
    <div id="lang-switcher" class="lang-switcher"></div>
    <button class="nav-btn icon-btn-sm" data-theme-toggle title="切换主题">🌙</button>
  </div>
</header>
{% else %}
{# ── Home / catalog header: logo + search + nav ── #}
<header class="site-header">
  <a class="logo" href="/zh-CN">
    <div class="logo-icon">🖼</div>
    {{ site_name }}
  </a>
  <div class="header-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="header-search-input" placeholder="搜索工具…" autocomplete="off" />
  </div>
  <nav class="header-nav">
    <a class="nav-btn" href="/zh-CN/tools">全部工具</a>
    <div id="lang-switcher" class="lang-switcher"></div>
    <button class="nav-btn icon-btn-sm" data-theme-toggle title="切换主题">🌙</button>
  </nav>
</header>
<div id="header-search-results" class="search-results hidden" style="position:fixed;top:56px;left:50%;transform:translateX(-50%);width:min(480px,calc(100vw - 32px));z-index:200;"></div>
{% endif %}
