<header class="site-header">
  <div class="container nav-row">
    <a class="brand" href="/zh-CN">
      <span class="brand-mark">图</span>
      <span>
        <strong>{{ site_name }}</strong>
        <small>在线处理图片与 PDF，更适合日常上传和资料整理</small>
      </span>
    </a>
    <div class="header-actions">
      <nav class="top-nav" aria-label="主导航">
        {% for item in nav_tools %}
        <a href="/zh-CN/{{ item.slug }}">{{ item.nav_title or item.title }}</a>
        {% endfor %}
        <a href="/zh-CN/tools">全部工具</a>
      </nav>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="切换主题">切换夜间</button>
    </div>
  </div>
</header>
