<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title }}</title>
    <meta name="description" content="{{ page.description }}" />
    <link rel="canonical" href="{{ page.canonical }}" />
    <meta property="og:title" content="{{ page.title }}" />
    <meta property="og:description" content="{{ page.description }}" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{ page.canonical }}" />
    <meta property="og:locale" content="zh_CN" />
    <meta property="og:image" content="{{ page.og_image }}" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="{{ page.og_image }}" />
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="stylesheet" href="/static/css/site.css" />
    {% for schema in page.structured_data %}
    <script type="application/ld+json">{{ schema | safe }}</script>
    {% endfor %}
    <script defer src="https://umami.acc-api.top/script.js" data-website-id="bcb3529f-1462-4991-8e31-6d8945379d95"></script>
  </head>
  <body>
    <div class="page-wrap">
      {% block header %}{% include "partials/header.html" %}{% endblock %}
      <main>{% block content %}{% endblock %}</main>
      {% include "partials/footer.html" %}
    </div>
    <script id="tool-index-data" type="application/json">{{ tool_index | tojson | safe }}</script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js" defer></script>
    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/app.js" defer></script>
  </body>
</html>
